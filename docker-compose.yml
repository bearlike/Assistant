services:
  api:
    image: ghcr.io/bearlike/meeseeks-api:latest
    pull_policy: always
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        BASE_IMAGE: ghcr.io/bearlike/meeseeks-base:latest
    network_mode: host
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file: docker.env
    volumes:
      - ./configs:/app/configs:ro
      - api-data:/app/data
      - /home/kk/Agents:/home/kk/Agents
      - /home/kk/Projects/Personal-Assistant:/home/kk/Projects/Personal-Assistant
      - /home/kk/Projects/Simple-Secrets-Manager:/home/kk/Projects/Simple-Secrets-Manager
    environment:
      - MEESEEKS_HOME=/app/data

  console:
    image: ghcr.io/bearlike/meeseeks-console:latest
    pull_policy: always
    build:
      context: .
      dockerfile: docker/Dockerfile.console
    network_mode: host
    env_file: docker.env

networks:
  default:
    external: true
    name: host

volumes:
  api-data:
