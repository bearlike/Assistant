services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-meeseeks}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-meeseeks}
      MONGO_INITDB_DATABASE: ${MEESEEKS_MONGODB_DATABASE:-meeseeks}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  api:
    image: ghcr.io/bearlike/meeseeks-api:latest
    pull_policy: build
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        BASE_IMAGE: ghcr.io/bearlike/meeseeks-base:latest
    network_mode: host
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    # Supplementary group so the api process can reach /var/run/docker.sock
    # (needed by the Web IDE feature's Docker SDK calls). Set DOCKER_GID in
    # docker.env to your host's docker group GID (`stat -c '%g' /var/run/docker.sock`).
    group_add:
      - "${DOCKER_GID:-999}"
    env_file: docker.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      - mongo
    volumes:
      - ./configs:/app/configs:ro
      - api-data:/app/data
      # Plan-mode scratch dirs live at /tmp/meeseeks/plans/<session_id>/.
      # ``/tmp`` is inside the container's writable layer and would be wiped
      # on every rebuild; the named volume keeps plan markdown + revision
      # files across restarts. Survives ``docker compose down``; cleared
      # only by ``docker compose down -v`` or ``docker volume rm``.
      - plans-data:/tmp/meeseeks/plans
      # Web IDE: Docker SDK needs write access to the socket to create
      # code-server sibling containers. Deadline files bind-mounted into
      # each IDE container live under /tmp/meeseeks-ide.
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/meeseeks-ide:/tmp/meeseeks-ide
      # Project directories and init scripts — add in docker-compose.override.yml
      # (see docker-compose.override.example.yml for the template)
    environment:
      - MEESEEKS_HOME=/app/data
      - MEESEEKS_IDE_STATE_DIR=/tmp/meeseeks-ide

  console:
    image: ghcr.io/bearlike/meeseeks-console:latest
    pull_policy: always
    build:
      context: .
      dockerfile: docker/Dockerfile.console
    network_mode: host
    env_file: docker.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  ide-proxy:
    image: nginx:1.27-alpine
    container_name: meeseeks-ide-proxy
    networks: [meeseeks-ide]
    # Loopback-only by default for safety. If an upstream edge proxy /
    # L7 gateway sits on a different host on your LAN, publish this on
    # the right interface via docker-compose.override.yml — see
    # docker-compose.override.example.yml for the pattern.
    ports: ["127.0.0.1:5126:8080"]
    volumes:
      - ./docker/nginx-ide-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

networks:
  meeseeks-ide:
    driver: bridge
    name: meeseeks-ide

volumes:
  api-data:
  mongo-data:
  plans-data:
