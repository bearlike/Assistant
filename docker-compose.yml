services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-meeseeks}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-meeseeks}
      MONGO_INITDB_DATABASE: ${MEESEEKS_MONGODB_DATABASE:-meeseeks}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  api:
    image: ghcr.io/bearlike/meeseeks-api:latest
    pull_policy: always
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        BASE_IMAGE: ghcr.io/bearlike/meeseeks-base:latest
    network_mode: host
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file: docker.env
    depends_on:
      - mongo
    volumes:
      - ./configs:/app/configs:ro
      - api-data:/app/data
      # Project directories — add your mounts in docker-compose.override.yml
      # (see docker-compose.override.example.yml for the template)
    environment:
      - MEESEEKS_HOME=/app/data

  console:
    image: ghcr.io/bearlike/meeseeks-console:latest
    pull_policy: always
    build:
      context: .
      dockerfile: docker/Dockerfile.console
    network_mode: host
    env_file: docker.env

volumes:
  api-data:
  mongo-data:
