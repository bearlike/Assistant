server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE streaming — no buffering, long timeout
    location /api/sessions/ {
        proxy_pass http://127.0.0.1:5125;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # Regular API calls
    location /api/ {
        proxy_pass http://127.0.0.1:5125/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fingerprinted build assets — safe to cache forever.
    # Vite emits /assets/<name>-<hash>.{js,css} so a new build = new URL.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Service worker, manifest, and runtime config must revalidate every load.
    # Without this, clients on an older SW keep serving stale index.html.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        expires off;
    }
    location = /runtime-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # SPA fallback — index.html is never cached by the browser, so every
    # navigation hits the server and picks up the latest hashed asset URLs.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
