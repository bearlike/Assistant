# Host-level nginx reverse proxy for Meeseeks
# Install: sudo ln -s /home/kk/Projects/Personal-Assistant/docker/nginx-reverse-proxy.conf /etc/nginx/sites-enabled/meeseeks
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Adjust: server_name, ssl_certificate, ssl_certificate_key, and port numbers.

server {
    listen 443 ssl http2;
    server_name meeseeks.hurricane.home;

    ssl_certificate     /path/to/your/server.crt;
    ssl_certificate_key /path/to/your/server.key;

    # Web IDE — dynamic proxy to per-session code-server containers
    location /ide/ {
        proxy_pass http://127.0.0.1:5126;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Console (frontend)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — SSE streaming needs no buffering
    location /api/sessions/ {
        proxy_pass http://127.0.0.1:5125;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # API — regular calls
    location /api/ {
        proxy_pass http://127.0.0.1:5125/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP redirect
server {
    listen 80;
    server_name meeseeks.hurricane.home;
    return 301 https://$host$request_uri;
}
