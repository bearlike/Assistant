resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8080;

    # Dynamic reverse proxy for per-session code-server containers.
    #
    # code-server's ``--abs-proxy-base-path /ide/<sid>`` contract is that
    # the reverse proxy strips the prefix before forwarding; code-server
    # then generates URLs back with the prefix so asset references work.
    # We capture the session id and the trailing path separately, then
    # rewrite the request URI to just the trailing path before handing
    # off to ``proxy_pass`` (which honors the rewritten URI when the
    # upstream is a variable).
    location ~ "^/ide/(?<sid>[a-f0-9]{32})(?<rest>/.*)?$" {
        set $upstream "http://mewbo-ide-$sid:8080";
        rewrite "^/ide/[a-f0-9]{32}(/.*)$" $1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
