repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy
        language: system
        pass_filenames: false
      - id: console-lint
        name: console-lint
        entry: bash -c 'cd apps/mewbo_console && npx eslint --ext .js,.jsx,.ts,.tsx --max-warnings=0 src/'
        language: system
        pass_filenames: false
        files: ^apps/mewbo_console/src/
