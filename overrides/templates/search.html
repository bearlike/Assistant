<!-- Unified Search + Ask AI modal -->
<dialog id="mewbo-modal" data-active="ask-ai" aria-label="Search and Ask AI">
    <div class="mewbo-modal__inner">

        <!-- Header row: mode-specific content (left) + grouped segmented toggle (right) -->
        <div class="mewbo-modal__header">

            <!-- Search mode: magnifier + input -->
            <div class="mewbo-header__search" data-mode="search">
                {{ "lucide:search" | iconify(height="16px") | safe }}
                <input
                    cmdk-input
                    id="mewbo-search-input"
                    type="text"
                    placeholder="Search for anything…"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                    aria-autocomplete="list"
                    role="combobox"
                    aria-expanded="true"
                    aria-label="Search documentation"
                    oninput="onInputHandler(event)"
                />
            </div>

            <!-- Ask AI mode: label -->
            <div class="mewbo-header__label" data-mode="ask-ai">Ask AI</div>

            <!-- Segmented toggle (always visible, top-right) -->
            <div class="mewbo-toggle" role="tablist" aria-label="Search or Ask AI">
                <button class="mewbo-toggle__btn" data-tab="search" role="tab" type="button">
                    {{ "lucide:search" | iconify(height="12px") | safe }}
                    Search
                </button>
                <button class="mewbo-toggle__btn" data-tab="ask-ai" role="tab" type="button">
                    {{ "lucide:sparkles" | iconify(height="12px") | safe }}
                    Ask AI
                </button>
            </div>

        </div>

        <!-- Search panel -->
        <div id="mewbo-search-panel" role="tabpanel">

            <!-- Ask AI handoff row -->
            <div id="mewbo-ask-ai-shortcut" role="button" tabindex="0" aria-label="Ask AI about your query">
                <span class="mewbo-shortcut__glyph" aria-hidden="true">
                    {{ "lucide:sparkles" | iconify(height="14px") | safe }}
                </span>
                <span class="mewbo-shortcut__label">Ask AI</span>
                <span id="mewbo-shortcut-query" class="mewbo-shortcut__query"></span>
                <span class="mewbo-shortcut__cta">Start conversation ↵</span>
            </div>

            <!-- Scope filter chips (populated by ask-ai.js when results exist) -->
            <div id="mewbo-search-filters" class="mewbo-search-filters" aria-label="Filter results by section"></div>

            <!-- Search results (Lunr populates this — ID must stay exactly mkdocs-search-results) -->
            <div id="mkdocs-search-results" role="listbox" aria-label="Search results"></div>

        </div>

        <!-- Ask AI panel -->
        <div id="mewbo-ask-ai-panel" role="tabpanel">

            <div class="mewbo-ask-ai__body">

                <!-- Welcome state (visible before submit) -->
                <div id="mewbo-welcome">

                    <!-- Greeting block: avatar + multi-line message with inline product pill -->
                    <div class="mewbo-greeting">
                        <div class="mewbo-greeting__avatar" aria-hidden="true">M</div>
                        <div class="mewbo-greeting__text">
                            <p>I'm an AI assistant with Mewbo's codebase and documentation in context.</p>
                            <p>Ask me anything about <span class="mewbo-greeting__pill">Mewbo</span>.</p>
                        </div>
                    </div>

                    <div class="mewbo-examples__label">EXAMPLE QUESTIONS</div>
                    <div class="mewbo-examples">
                        <button class="mewbo-example-pill" data-question="How do I install and configure Mewbo?" type="button">How do I install and configure Mewbo?</button>
                        <button class="mewbo-example-pill" data-question="How does the agent hypervisor work?" type="button">How does the agent hypervisor work?</button>
                        <button class="mewbo-example-pill" data-question="How do I add MCP tools?" type="button">How do I add MCP tools?</button>
                        <button class="mewbo-example-pill" data-question="How do I connect Home Assistant?" type="button">How do I connect Home Assistant?</button>
                    </div>
                </div>

                <!-- Answer state (hidden before submit) -->
                <div id="mewbo-answer" style="display: none;">

                    <!-- Skeleton shimmer (shown while loading) -->
                    <div id="mewbo-skeleton">
                        <div class="mewbo-skeleton__line"></div>
                        <div class="mewbo-skeleton__line"></div>
                        <div class="mewbo-skeleton__line"></div>
                        <div class="mewbo-skeleton__line"></div>
                    </div>

                    <!-- Rendered answer text -->
                    <div id="mewbo-answer-text"></div>

                    <!-- Ask another question CTA -->
                    <button id="mewbo-ask-another" type="button" style="display: none;">Ask another question →</button>

                </div>

            </div>

            <!-- Input footer -->
            <div class="mewbo-ask-ai__input-footer">
                <input
                    id="mewbo-ai-input"
                    type="text"
                    placeholder="How do I get started?"
                    autocomplete="off"
                    aria-label="Ask AI a question"
                />
                <button id="mewbo-ai-send" type="button" disabled aria-label="Send question">
                    {{ "lucide:send" | iconify(height="16px") | safe }}
                </button>
            </div>

        </div>

    </div>
</dialog>

<!-- Floating Ask AI button -->
<button id="mewbo-fab" type="button" aria-label="Ask AI">
    {{ "lucide:sparkles" | iconify(height="16px") | safe }}
    Ask AI
</button>

<script>
    // Override theme's onSearchBarClick so Ctrl K / Cmd K open our modal
    window.onSearchBarClick = function() {
        var m = document.getElementById('mewbo-modal');
        if (m && m.open) { m.close(); } else if (m) { m.dataset.active = 'search'; m.showModal(); }
    };
    document.removeEventListener('keydown', searchShortcutHandler);
    document.addEventListener('keydown', searchShortcutHandler);
</script>
