coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
        paths:
          - "packages/mewbo_tools/src/mewbo_tools/vendor/**"
          - "vendor/**"

comment:
  layout: "header, diff, components"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        informational: true
  individual_components:
    - component_id: core
      name: core
      paths:
        - "packages/mewbo_core/**"
    - component_id: tools
      name: tools
      paths:
        - "packages/mewbo_tools/**"
    - component_id: cli
      name: cli
      paths:
        - "apps/mewbo_cli/**"
    - component_id: api
      name: api
      paths:
        - "apps/mewbo_api/**"
    - component_id: ha
      name: ha
      paths:
        - "mewbo_ha_conversation/**"
