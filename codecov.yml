coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
        paths:
          - "packages/truss_tools/src/truss_tools/vendor/**"
          - "vendor/**"

comment:
  layout: "header, diff, components"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        informational: true
  individual_components:
    - component_id: core
      name: core
      paths:
        - "packages/truss_core/**"
    - component_id: tools
      name: tools
      paths:
        - "packages/truss_tools/**"
    - component_id: cli
      name: cli
      paths:
        - "apps/truss_cli/**"
    - component_id: api
      name: api
      paths:
        - "apps/truss_api/**"
    - component_id: ha
      name: ha
      paths:
        - "truss_ha_conversation/**"
