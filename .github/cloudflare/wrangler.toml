name = "mewbo-docs-discovery"
main = "worker.js"
compatibility_date = "2024-11-06"

routes = [
  { pattern = "docs.mewbo.com/*", zone_name = "mewbo.com" }
]

# worker.js is product-neutral and shipped by the upstream brand-fork
# (mewbo-com/mkdocs-shadcn). All product values come from [vars] below.
# Refresh worker.js with:
#   curl -L https://raw.githubusercontent.com/mewbo-com/mkdocs-shadcn/master/cloudflare/worker.js \
#     > .github/cloudflare/worker.js
[vars]
SITE_URL        = "https://docs.mewbo.com"
API_URL         = "https://api.mewbo.com"
MCP_SERVER_NAME = "Mewbo"
