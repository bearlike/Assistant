name: Console CI

on:
  pull_request:
    paths:
      - "apps/mewbo_console/**"
  workflow_dispatch:

permissions:
  contents: read

# One run per PR; a new commit cancels the superseded run.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/mewbo_console

jobs:
  lint:
    name: eslint + tsc
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mewbo_console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:ci

      - name: TypeScript
        run: npm run typecheck

  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mewbo_console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:ci

  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mewbo_console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: apps/mewbo_console/dist
          retention-days: 7
