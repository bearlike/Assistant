[project]
name = "mewbo-graph"
version = "0.0.13"
description = "Optional knowledge-graph substrate for Mewbo — tree-sitter code graph, multiplex atomic-note memory, embedder, hybrid retriever, and the Source Capability Graph (SCG) reachability engine. Powers MewboWiki and Mewbo Search; depends only on mewbo-core."
readme = "../../README.md"
requires-python = ">=3.10,<4.0"
authors = [
  { name = "Krishnakanth Alagiri", email = "mail@kanth.tech" },
]
license = { text = "MIT" }

# Down-only: the substrate depends on the lean core SDK and pydantic, never
# on mewbo-tools or any app. Heavy/optional capabilities live behind extras
# (below) + in-code import-guards, so a bare install is dependency-light.
dependencies = [
  "mewbo-core>=0.0.10",
  "pydantic>=2.7.0,<3.0.0",
]

[project.optional-dependencies]
# Tree-sitter code-graph extraction (the `code` graph + KG view). Absent →
# graph build is skipped and retrieval degrades to BM25-only, never a crash
# (import-guarded at the call site).
#
# Pins track the API the code actually uses, not just "something installable":
#   * tree-sitter >=0.25 — graph.py uses ``QueryCursor`` (0.25+).
#   * tree-sitter-language-pack >=1.8,<2 — the 1.x line is a Rust-native rewrite
#     that fetches parsers at runtime and exposes ``cache_dir()``/``download()``
#     (graph.py:_load_ts_language depends on both). The old ``>=0.3`` floor was
#     unbounded: a rebuild silently jumped 0.x (bundled parser wheels, no
#     network) to 1.x (runtime GitHub download), which is what introduced the
#     "Download error: ... 504" indexing failure. Cap below 2.0 so the next
#     major can't repeat that behavioural break without an explicit bump.
treesitter = [
  "tree-sitter>=0.25",
  "tree-sitter-language-pack>=1.8,<2",
]
# Hybrid dense+sparse retrieval. Embeddings ride litellm (already a
# mewbo-core dependency) against the LiteLLM proxy — no extra embedding
# client. See src/mewbo_graph/wiki/embedder.py.
retrieval = [
  "rank-bm25>=0.2.2",
  "numpy>=1.26",
  "rapidfuzz>=3.0",
]
# Everything the wiki + search products need at full strength.
full = [
  "mewbo-graph[treesitter,retrieval]",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mewbo_graph"]
# Ship the non-Python assets the substrate carries: tree-sitter query files
# and the bundled plugin suites (tool modules + AgentDef markdown + manifests).
include = [
  "src/mewbo_graph/wiki/graph_queries/**",
  "src/mewbo_graph/plugins/**",
]
# Contributor docs are not runtime assets; keep them out of the published wheel.
exclude = [
  "**/CLAUDE.md",
]
